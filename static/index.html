<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 助手</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .app {
      width: 100%; max-width: 720px; height: 90vh; background: #fff;
      border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,.3);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      padding: 18px 24px; background: #fff; border-bottom: 1px solid #eee;
      font-size: 18px; font-weight: 600; color: #333;
    }
    .header .dot { color: #10b981; font-size: 12px; margin-left: 8px; }
    .messages { flex: 1; overflow-y: auto; padding: 24px; background: #f7f8fa; }
    .msg { margin-bottom: 18px; display: flex; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 75%; padding: 12px 16px; border-radius: 14px;
      line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble { background: #667eea; color: #fff; border-bottom-right-radius: 4px; }
    .msg.ai .bubble { background: #fff; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .thinking { font-size: 12px; color: #999; font-style: italic; margin-bottom: 6px; }
    .tool { font-size: 12px; color: #f59e0b; margin-bottom: 4px; }
    .input-bar { padding: 16px 24px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 12px; }
    .input-bar input {
      flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 24px;
      font-size: 15px; outline: none;
    }
    .input-bar input:focus { border-color: #667eea; }
    .input-bar button {
      padding: 12px 28px; background: #667eea; color: #fff; border: none;
      border-radius: 24px; font-size: 15px; cursor: pointer;
    }
    .input-bar button:disabled { background: #bbb; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="app" class="app">
    <div class="header">AI 助手 <span class="dot">● 在线</span></div>
    <div class="messages" ref="msgBox">
      <div v-for="(m, i) in messages" :key="i" class="msg" :class="m.role">
        <div class="bubble">
          <div v-if="m.thinking" class="thinking">💭 {{ m.thinking }}</div>
          <div v-for="(t, j) in m.tools" :key="j" class="tool">🔧 {{ t }}</div>
          <span>{{ m.content }}</span>
        </div>
      </div>
    </div>
    <div class="input-bar">
      <input v-model="input" @keyup.enter="send" :disabled="loading"
             placeholder="输入消息，回车发送…" />
      <button @click="send" :disabled="loading || !input.trim()">
        {{ loading ? '思考中' : '发送' }}
      </button>
    </div>
  </div>

  <script>
    const { createApp, ref, nextTick } = Vue;
    createApp({
      setup() {
        const messages = ref([]);
        const input = ref('');
        const loading = ref(false);
        const msgBox = ref(null);

        const scroll = () => nextTick(() => {
          if (msgBox.value) msgBox.value.scrollTop = msgBox.value.scrollHeight;
        });

        const send = async () => {
          const text = input.value.trim();
          if (!text || loading.value) return;

          messages.value.push({ role: 'user', content: text });
          input.value = '';
          loading.value = true;

          // 历史（不含本次）
          const history = messages.value
            .filter(m => m.role === 'user' || m.role === 'ai')
            .slice(0, -1)
            .map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content }));

          // 占位 AI 气泡
          const ai = { role: 'ai', content: '', thinking: '', tools: [] };
          messages.value.push(ai);
          scroll();

          try {
            const res = await fetch('/api/chat', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: text, history }),
            });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';

            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              buffer += decoder.decode(value, { stream: true });
              const lines = buffer.split('\n\n');
              buffer = lines.pop();

              for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const evt = JSON.parse(line.slice(6));
                if (evt.type === 'token') {
                  ai.thinking += evt.data;        // 流式过程先进 thinking
                } else if (evt.type === 'tool') {
                  ai.tools.push(evt.data);
                } else if (evt.type === 'done') {
                  ai.thinking = '';                // 完成后清掉过程，显示最终答案
                  ai.content = evt.data;
                } else if (evt.type === 'error') {
                  ai.content = '出错了: ' + evt.data;
                }
                scroll();
              }
            }
          } catch (e) {
            ai.content = '请求失败: ' + e.message;
          } finally {
            loading.value = false;
            scroll();
          }
        };

        return { messages, input, loading, send, msgBox };
      }
    }).mount('#app');
  </script>
</body>
</html>
